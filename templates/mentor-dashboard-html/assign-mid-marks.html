{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assign Marks — Mentor Dashboard</title>
  <meta name="description" content="Assign and track mid marks, internal, external marks, and final CGPA for students.">
  <link rel="stylesheet" href="{% static 'mentor-dashboard-html/css/styles.css' %}">
  <script src="{% static 'mentor-dashboard-html/js/theme.js' %}"></script>
</head>
<body>

<!-- ── HEADER (mirrors AssignMidMarks.tsx header) ─── -->
<header class="top-header">
  <div class="top-header-left">
    <button id="hamburger-menu-btn" class="hamburger-btn" aria-label="Open navigation menu" aria-expanded="false" aria-controls="mobile-menu">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <h1 class="font-semibold" style="font-size:0.9375rem; margin:0; color:var(--foreground);">Assign Marks</h1>
    <p class="text-xs text-muted" style="margin:0.125rem 0 0;">Select mark type and enter marks or final CGPA for students.</p>
  </div>
  <div class="top-header-actions">
    <a href="{% url 'mentor-dashboard' %}" class="btn btn-outline btn-sm">Back to Dashboard</a>
    <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle theme">
      <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<nav id="mobile-menu" class="mobile-menu" aria-label="Mobile navigation">
  <div class="mobile-menu-links">
    <a class="mobile-menu-link" href="{% url 'mentor-dashboard' %}">Home</a>
    <a class="mobile-menu-link" href="{% url 'mentor-profile' %}">Mentor Profile</a>
    <a class="mobile-menu-link" href="{% url 'mentor-students' %}"> Assigned Students</a>
    <a class="mobile-menu-link" href="{% url 'mentor-assign-marks' %}">Assign Marks</a>
    <a class="mobile-menu-link" href="{% url 'mentor-upload-attendance' %}">Upload Attendance</a>
    <a class="mobile-menu-link" href="{% url 'mentor-cohorts' %}">Cohorts</a>
    <a class="mobile-menu-link" href="{% url 'mentor-courses' %}">Courses</a>
  </div>
</nav>

<!-- ── MAIN CONTENT ────────────────────────────────────── -->
<main style="padding: 1.5rem; max-width: 1800px; margin: 0 auto;">

  <!-- Tab navigation (mirrors AssignMidMarks.tsx tab buttons) -->
  <div id="marks-tab-nav" class="tab-nav" style="margin-bottom:1.25rem;">
    <!-- Rendered by assign-marks.js -->
  </div>

  <!-- Sheet content (rendered dynamically) -->
  <div id="marks-sheet">
    <!-- Rendered by assign-marks.js -->
  </div>

</main>

<script src="{% static 'mentor-dashboard-html/js/data.js' %}"></script>
<script src="{% static 'mentor-dashboard-html/js/assign-marks.js' %}"></script>
<script src="{% static 'mentor-dashboard-html/js/menu.js' %}"></script>
</body>
</html>
